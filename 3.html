<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Identity</title>
<style>
    :root { 
        --accent: #f8b195; 
        --accent2: #7fb7ff; 
        --muted: #b7c6bf; 
        --warn: #f67280; 
        --bg: #050505;
        --card: rgba(10, 10, 20, 0.98);
    }
    body { 
        margin: 0; background: var(--bg); color: white; 
        font-family: 'Courier New', monospace; padding: 20px;
    }
    .card { 
        background: var(--card); border: 2px solid var(--accent); 
        margin-bottom: 20px;
    }
    .card-hd { 
        background: rgba(248, 177, 149, 0.1); 
        padding: 10px 15px; border-bottom: 2px solid var(--accent);
    }
    .card-hd h2 { margin: 0; font-size: 16px; color: var(--accent); text-transform: uppercase; }
    .card-bd { padding: 20px; }
    .pixel-art-container { background: #111; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .sep { height: 2px; background: var(--accent); margin: 20px 0; opacity: 0.3; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .kpi { text-align: center; padding: 10px; border: 1px solid var(--accent); }
    .kpi .v { font-size: 20px; font-weight: bold; color: var(--accent2); }
    .kpi .k { font-size: 10px; color: var(--muted); }
    .bar { height: 12px; background: #222; border: 1px solid #444; border-radius: 0; }
    .item { margin-bottom: 15px; }
    .mono { font-family: 'Courier New', monospace; }
    .tiny { font-size: 11px; color: var(--muted); }
    .back-btn { 
        background: #444; color: white; border: 1px solid var(--accent); 
        padding: 10px 20px; cursor: pointer; font-family: inherit; margin-bottom: 20px;
    }
    .back-btn:hover { background: var(--warn); }
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='2.html'">< BACK TO SYSTEM</button>

<div id="profile-detail-page" style="max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
    
    <section class="card">
        <div class="card-hd"><h2>Character Identity</h2></div>
        <div class="card-bd" style="text-align: center;">
            <div class="pixel-art-container" style="width: 180px; height: 180px; border: 4px solid var(--accent2);">
                <div style="font-size: 80px;">🧙</div>
            </div>
            <h1 style="color: var(--accent); margin: 20px 0 5px;">Mage Architect</h1>
            <p class="mono" style="font-size: 14px; color: var(--muted);">Member since Nov 2025</p>
            <div class="sep"></div>
            <div class="grid2">
                <div class="kpi"><div class="v">342</div><div class="k">Quests Done</div></div>
                <div class="kpi"><div class="v">12.5k</div><div class="k">Total XP</div></div>
            </div>
        </div>
    </section>

    <section>
        <div class="card">
            <div class="card-hd"><h2>Mastery Distribution</h2></div>
            <div class="card-bd">
                <p class="tiny" style="margin-bottom: 15px;">Your identity is shaped by where you spend your minutes.</p>
                <div class="list">
                    <div class="item">
                        <div style="display:flex; justify-content:space-between"><span>Study</span><span class="mono">Lv. 42</span></div>
                        <div class="bar"><div style="width: 85%; background: var(--accent2); height: 100%;"></div></div>
                    </div>
                    <div class="item">
                        <div style="display:flex; justify-content:space-between"><span>Fitness</span><span class="mono">Lv. 12</span></div>
                        <div class="bar"><div style="width: 30%; background: var(--warn); height: 100%;"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-hd"><h2>The Hall of Resilience</h2></div>
            <div class="card-bd">
                <div class="grid3">
                    <div class="hint" style="text-align: center; border: 1px dashed var(--accent); padding: 10px;">
                        <div style="font-size: 24px;">🔥</div>
                        <b style="font-size: 10px; display: block; margin-top: 5px;">7-Day Spark</b>
                    </div>
                    <div class="hint" style="text-align: center; border: 1px dashed var(--accent); padding: 10px; opacity: 0.5;">
                        <div style="font-size: 24px;">🛡️</div>
                        <b style="font-size: 10px; display: block; margin-top: 5px;">Burnout Shield</b>
                    </div>
                    <div class="hint" style="text-align: center; border: 1px dashed var(--accent); padding: 10px;">
                        <div style="font-size: 24px;">🤝</div>
                        <b style="font-size: 10px; display: block; margin-top: 5px;">Mercenary</b>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
